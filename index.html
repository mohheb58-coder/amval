<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;direction:rtl;background:#f0f4f8;color:#222;font-size:14px;overflow-x:hidden}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a3a5c,#4361ee)}
.login-box{background:#fff;border-radius:18px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-box h2{font-size:18px;color:#1a3a5c;margin-bottom:4px}
.login-box p{font-size:12px;color:#999;margin-bottom:24px}
.login-box input{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid #ddd;font-size:15px;text-align:center;letter-spacing:6px;margin-bottom:14px;font-family:monospace}
.login-box input:focus{outline:none;border-color:#4361ee;box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.login-box button{width:100%;padding:12px;border-radius:8px;background:linear-gradient(135deg,#1a3a5c,#4361ee);color:#fff;border:none;font-size:14px;cursor:pointer;font-family:Tahoma}
.login-box button:hover{opacity:.9}
.login-err{color:#e53935;font-size:12px;margin-top:8px;min-height:18px}
/* MAIN */
#main-app{display:none}
.header{background:linear-gradient(135deg,#1a3a5c,#2d5a8e);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:bold}
.header p{font-size:11px;opacity:.8;margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}
.header-actions button{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:12px;font-family:Tahoma}
.nav{background:#fff;border-bottom:2px solid #e8eef6;padding:0 20px;display:flex;gap:2px}
.nav-btn{padding:10px 16px;border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;font-size:13px;color:#666;font-family:Tahoma,Arial;transition:all .15s}
.nav-btn.active{color:#4361ee;border-bottom-color:#4361ee;font-weight:bold}
.nav-btn:hover:not(.active){background:#f5f8ff;color:#4361ee}
.main{padding:16px;overflow-x:hidden;max-width:100%}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:14px}
.stat-card{border-radius:12px;padding:14px;text-align:center;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.stat-card .num{font-size:26px;font-weight:bold}
.stat-card .lbl{font-size:10px;opacity:.88;margin-top:3px}
/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;background:#fff;padding:10px 12px;border-radius:10px;border:1px solid #e8eef6}
.toolbar input,.toolbar select{padding:8px 12px;border-radius:7px;border:1.5px solid #e0e8f0;font-size:13px;font-family:Tahoma,Arial;background:#f7fafd;color:#222;transition:border .2s}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#4361ee;background:#fff}
.toolbar input{min-width:200px}
/* BUTTONS */
button{padding:7px 14px;border-radius:7px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px;font-family:Tahoma,Arial,sans-serif;color:#333;transition:all .15s}
button:hover{filter:brightness(.95)}
.btn-blue{background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;border:none}
.btn-green{background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:#fff;border:none}
.btn-orange{background:linear-gradient(135deg,#f8961e,#f3722c);color:#fff;border:none}
.btn-purple{background:linear-gradient(135deg,#7209b7,#560bad);color:#fff;border:none}
.btn-red{background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;border:none}
.btn-teal{background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;border:none}
/* TABLE */
.table-wrap{overflow-x:hidden;overflow-y:auto;max-height:calc(100vh - 280px);border-radius:10px;border:1px solid #e0e8f0;box-shadow:0 2px 8px rgba(0,0,0,.05);width:100%}
.table-wrap thead th{position:sticky;top:0;z-index:2;background:linear-gradient(135deg,#f0f4ff,#e8eef8)}
table{width:100%;border-collapse:collapse;font-size:11px;background:#fff;table-layout:fixed}
thead tr{background:linear-gradient(135deg,#f0f4ff,#e8eef8)}
th{padding:8px 6px;text-align:right;font-weight:bold;color:#1a3a5c;border-bottom:2px solid #d0d8f0;white-space:normal;cursor:pointer;user-select:none;transition:background .15s;overflow:hidden;font-size:10px;line-height:1.3}
th:hover{background:#dce4f8}
td{padding:6px 6px;border-bottom:1px solid #f0f4f8;color:#333;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;word-break:break-word;font-size:11px}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fafbfe}
tr:hover td{background:#eff3ff!important}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:bold}
.badge-g{background:#e0f7ee;color:#1b7a4a}
.badge-b{background:#e3edff;color:#1a3a8c}
.badge-o{background:#fff3e0;color:#b84d00}
.badge-r{background:#ffeaea;color:#b71c1c}
.badge-p{background:#f3e5f5;color:#6a0080}
/* FORM */
.form-card{background:#fff;border-radius:14px;padding:24px;max-width:640px;box-shadow:0 4px 20px rgba(67,97,238,.1);border:1px solid #e8eef6}
.form-section{background:#f7fafd;border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid #e0ecf8}
.form-section-title{font-size:11px;font-weight:bold;color:#4361ee;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#1a3a5c;margin-bottom:5px;font-weight:bold}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid #e0e8f0;font-size:13px;font-family:Tahoma,Arial;background:#f7fafd;color:#222;transition:all .2s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#4361ee;background:#fff;box-shadow:0 0 0 3px rgba(67,97,238,.08)}
.form-row textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:2px solid #f0f4f8}
/* LOCATIONS */
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.loc-card{background:#fff;border-radius:12px;border:2px solid #e8eef6;padding:14px;transition:all .2s;cursor:pointer}
.loc-card:hover{border-color:#4361ee;box-shadow:0 4px 12px rgba(67,97,238,.15)}
/* PAGINATION */
.pagination{display:flex;gap:6px;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:#666;background:#fff;padding:8px 12px;border-radius:8px;border:1px solid #e8eef6}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:bold;margin-bottom:16px;color:#1a3a5c;padding-bottom:10px;border-bottom:2px solid #f0f4f8}
/* REPORT */
.report-header-print{background:linear-gradient(135deg,#1a3a5c,#4361ee);color:#fff;border-radius:12px;padding:16px;margin-bottom:14px;text-align:center}
.row-actions{display:flex;gap:4px}
.row-actions button{padding:3px 8px;font-size:11px}
@media print{
  .nav,.toolbar,.row-actions,.pagination,#no-print,.header-actions{display:none!important}
  body{background:#fff;font-size:10px}
  #main-app,.main{background:#fff!important}
  .report-header-print{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table{border-collapse:collapse!important;width:100%!important;font-size:10px}
  th,td{border:1px solid #555!important;padding:4px 6px!important}
  thead tr{background:#dce6f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .badge{border:1px solid #888;font-size:9px;padding:1px 4px}
  .table-wrap{border:none!important;box-shadow:none!important}
}
</style>
</head>

<div class="main" id="app"></div>
</div>

function showTab(t){
  currentTab=t;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.remove('active'));
  const tabs=['dashboard','assets','add','locations','report','settings'];
  const idx=tabs.indexOf(t);

  render();
}

// ===== FILTER =====
function getFiltered(){
  return assets.filter(a=>{
    const q=searchQ.trim().toLowerCase();
    const mq=!q||(
      (a.name||'').toLowerCase().includes(q)||
      (a.tag||'').toLowerCase().includes(q)||
      (a.code||'').toLowerCase().includes(q)||
      (a.model||'').toLowerCase().includes(q)||
      (a.location||'').toLowerCase().includes(q)||
      (a.type||'').toLowerCase().includes(q)||
      (a.notes||'').toLowerCase().includes(q)
    );
    const mt=!filterType||a.type===filterType;
    const ml=!filterLoc||a.location===filterLoc;
    const mh=!filterTag||(filterTag==='yes'&&a.hasTag)||(filterTag==='no'&&!a.hasTag);
    const ms=!filterScrap||(filterScrap==='yes'&&a.isScrap)||(filterScrap==='no'&&!a.isScrap);
    const mx=!filterSurplus||(filterSurplus==='yes'&&a.isSurplus)||(filterSurplus==='no'&&!a.isSurplus);
    return mq&&mt&&ml&&mh&&ms&&mx;
  });
}
function getSorted(arr){
  return [...arr].sort((a,b)=>{
    let va=a[sortField],vb=b[sortField];
    if(va===undefined||va===null)va='';
    if(vb===undefined||vb===null)vb='';
    if(sortField==='price'||sortField==='row'){
      return(Number(va)-Number(vb))*sortDir;
    }
    if(typeof va==='boolean') return (va===vb?0:va?-1:1)*sortDir;
    return String(va).localeCompare(String(vb),'fa',{sensitivity:'base',numeric:true})*sortDir;
  });
}

  else if(currentTab==='locations')renderLocations(app);
  else if(currentTab==='report')renderReport(app);
  else if(currentTab==='settings')renderSettings(app);
}

        <td>${a.isScrap?'<span class="badge badge-r">⚠️ بله</span>':'<span style="color:#aaa;font-size:12px">خیر</span>'}</td>
        <td>${a.isSurplus?'<span class="badge badge-o">📦 بله</span>':'<span style="color:#aaa;font-size:12px">خیر</span>'}</td>
        <td><div class="row-actions">
          <button onclick="editAsset(${a.id})" title="ویرایش">✏️</button>
          <button onclick="deleteAsset(${a.id})" style="color:#c62828" title="حذف">🗑️</button>
        </div></td>
      </tr>`).join(''):`<tr><td colspan="13" style="text-align:center;padding:24px;color:#aaa">موردی یافت نشد</td></tr>`}
      </tbody>
    </table>
  </div>
  <div style="font-size:11px;color:#999;text-align:left;margin-top:6px;padding:4px 8px">${filtered.length.toLocaleString('fa-IR')} مورد</div>`;
  // search with focus preservation
  const si=document.getElementById('asset-search');
  if(si){
    si.addEventListener('input',function(){
      clearTimeout(window._ast);
      const v=this.value, cp=this.selectionStart;
      window._ast=setTimeout(()=>{
        searchQ=v;currentPage=1;
        renderAssets(document.getElementById('app'));
        const ni=document.getElementById('asset-search');
        if(ni){ni.focus();try{ni.setSelectionRange(cp,cp);}catch(e){}}
      },250);
    });
  }
}

function doPrint(orient){
  const rows   = _cachedPrintRows;
  const prLoc  = (document.getElementById('pr-loc')?.value  ||'').trim();
  const prDesc = (document.getElementById('pr-desc')?.value ||'').trim();
  const role1  = (document.getElementById('pr-role1')?.value||'').trim();
  const name1  = (document.getElementById('pr-name1')?.value||'').trim();
  const role2  = (document.getElementById('pr-role2')?.value||'').trim();
  const name2  = (document.getElementById('pr-name2')?.value||'').trim();
  const role3  = (document.getElementById('pr-role3')?.value||'').trim();
  const name3  = (document.getElementById('pr-name3')?.value||'').trim();

  const pc = printColumns;
  const colDefs=[
    {key:'row',label:'ردیف'},{key:'tag',label:'برچسب'},{key:'code',label:'کد مال'},
    {key:'name',label:'عنوان مال'},{key:'type',label:'نوع'},{key:'model',label:'مدل'},
    {key:'price',label:'قیمت (ریال)'},{key:'location',label:'مکان'},
    {key:'hasTag',label:'برچسب فیزیکی'},{key:'isScrap',label:'اسقاطی'},
    {key:'isSurplus',label:'مازاد'},{key:'notes',label:'ملاحظات'},
  ];
  const active = colDefs.filter(c=>pc[c.key]);
  function cv(a,k){
    if(k==='row')       return a.row||'';
    if(k==='tag')       return a.tag||'';
    if(k==='code')      return a.code||'';
    if(k==='name')      return a.name||'';
    if(k==='type')      return a.type||'';
    if(k==='model')     return a.model||'';
    if(k==='price')     return a.price ? Number(a.price).toLocaleString() : '';
    if(k==='location')  return a.location||'';
    if(k==='hasTag')    return a.hasTag?'دارد':'ندارد';
    if(k==='isScrap')   return a.isScrap?'بله':'';
    if(k==='isSurplus') return a.isSurplus?'بله':'';
    if(k==='notes')     return a.notes||'';
    return '';
  }
  function sigBlock(role,name){
    return '<div class="sig">'
      +'<div class="sig-role">'+(role||'')+'</div>'
      +(name ? '<div class="sig-name">'+name+'</div>' : '<div style="height:24px"></div>')
      +'<div class="sig-line">امضاء: ________________</div>'
      +'</div>';
  }

  let tableRows = '';
  for(let i=0;i<rows.length;i++){
    const a=rows[i];
    tableRows += '<tr>'+active.map(c=>'<td>'+cv(a,c.key)+'</td>').join('')+'</tr>';
  }

  const html = '<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8">'
    +'<title>فهرست اموال'+(prLoc?' — '+prLoc:'')+'</title>'
    +'<style>'
    +'@page{size:A4 '+(orient==='landscape'?'landscape':'portrait')+';margin:12mm 10mm}'
    +'*{box-sizing:border-box}'
    +'body{font-family:Tahoma,Arial,sans-serif;font-size:10px;direction:rtl;margin:0}'
    +'h2{text-align:center;margin:2px 0;font-size:14px}'
    +'h3{text-align:center;margin:2px 0;font-size:12px;color:#1a3a5c}'
    +'.desc{text-align:center;font-size:10px;color:#555;margin:2px 0}'
    +'.meta{text-align:center;font-size:9px;color:#888;margin:4px 0 8px}'
    +'table{width:100%;border-collapse:collapse;margin-top:6px}'
    +'th,td{border:1px solid #777;padding:3px 5px;text-align:right;font-size:9px}'
    +'thead tr{background:#dce6f0;-webkit-print-color-adjust:exact;print-color-adjust:exact}'
    +'.sigs{display:flex;justify-content:space-around;margin-top:36px;padding-top:14px;border-top:1px dashed #bbb}'
    +'.sig{text-align:center;min-width:110px}'
    +'.sig-role{font-weight:bold;font-size:10px;color:#333;margin-bottom:4px}'
    +'.sig-name{font-size:11px;color:#1a3a5c;font-weight:bold;margin-bottom:10px}'
    +'.sig-line{font-size:10px;color:#555;margin-top:6px}'
    +'</style></head><body>'
    +'<h2>'+appSettings.schoolName+'</h2>'
    +(prLoc  ? '<h3>📍 مکان: '+prLoc+'</h3>' : '')
    +(prDesc ? '<div class="desc">'+prDesc+'</div>' : '')
    +'<div class="meta">تعداد: '+rows.length+' قلم &nbsp;|&nbsp; تاریخ: '+new Date().toLocaleDateString('fa-IR')+' &nbsp;|&nbsp; مدیر: '+appSettings.principal+'</div>'
    +'<table><thead><tr>'+active.map(c=>'<th>'+c.label+'</th>').join('')+'</tr></thead>'
    +'<tbody>'+tableRows+'</tbody></table>'
    +'<div class="sigs">'+sigBlock(role1,name1)+sigBlock(role2,name2)+sigBlock(role3,name3)+'</div>'
    +'<'+'script>window.onload=function(){window.print();}<'+'/script>'
    +'</body></html>';

  const w = window.open('','_blank');
  w.document.open();
  w.document.write(html);
  w.document.close();
  document.getElementById('print-dialog-bg')?.remove();
  _cachedPrintRows = [];
}

function previewImg(input){
  if(!input.files||!input.files[0])return;
  const r=new FileReader();
  r.onload=ev=>{
    const p=document.getElementById('img-preview');
    if(p)p.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  r.readAsDataURL(input.files[0]);
}
function removeImg(id){
  if(!confirm('تصویر این قلم حذف شود؟'))return;
  delete itemImages[id];
  saveAll();
  renderAdd(document.getElementById('app'));
}

function saveForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('عنوان مال الزامی است');return;}
  const isScrap=document.getElementById('f-scrap').value==='yes';
  const isSurplus=document.getElementById('f-surplus').value==='yes';
  const obj={name,
    type:document.getElementById('f-type').value,
    code:document.getElementById('f-code').value.trim(),
    model:document.getElementById('f-model').value.trim(),
    location:document.getElementById('f-loc').value,
    price:parseInt(document.getElementById('f-price').value)||0,
    hasTag:document.getElementById('f-hastag').value==='yes',
    tag:document.getElementById('f-tag').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    isScrap,isSurplus};
  const imgInput=document.getElementById('f-image');
  if(imgInput&&imgInput.files&&imgInput.files[0]&&editingId){
    const r=new FileReader();
    r.onload=ev=>{itemImages[editingId]=ev.target.result;finishSave(obj);};
    r.readAsDataURL(imgInput.files[0]);
  } else {
    finishSave(obj);
  }
}
function finishSave(obj){
  if(editingId){
    const idx=assets.findIndex(a=>a.id===editingId);
    if(idx>=0)assets[idx]={...assets[idx],...obj};
    editingId=null;
  }else{
    const mid=assets.reduce((m,a)=>Math.max(m,a.id),0);
    const mr=assets.reduce((m,a)=>Math.max(m,a.row||0),0);
    assets.push({id:mid+1,row:mr+1,...obj});
  }
  saveAll();showTab('assets');
}
function editAsset(id){editingId=id;showTab('add');}
function deleteAsset(id){
  const a=assets.find(x=>x.id===id);
  if(!a)return;
  const confirmed=prompt(`⚠️ حذف کامل از سیستم\n\nنام کالا: ${a.name}\nبرچسب: ${a.tag||'—'}\nمکان: ${a.location||'بدون مکان'}\n\nاین عمل غیرقابل بازگشت است!\nبرای تأیید، عبارت «حذف» را تایپ کنید:`);
  if(confirmed!=='حذف'){
    if(confirmed!==null)alert('عملیات لغو شد. عبارت «حذف» را دقیقاً تایپ نکردید.');
    return;
  }
  delete itemImages[id];
  assets=assets.filter(x=>x.id!==id);
  saveAll();
  renderAssets(document.getElementById('app'));
}

// icon mapping based on keywords in location name
function locIcon(name){
  const n=name;
  if(/آزمایشگاه/.test(n))return'🔬';
  if(/کتابخانه|کتاب/.test(n))return'📚';
  if(/مدیر|ریاست/.test(n))return'🏢';
  if(/انبار/.test(n))return'📦';
  if(/سالن|ورزش/.test(n))return'🏋️';
  if(/رایانه|کامپیوتر/.test(n))return'🖥️';
  if(/نماز/.test(n))return'🕌';
  if(/بهداشت|درمان/.test(n))return'🏥';
  if(/هنر|نقاشی/.test(n))return'🎨';
  if(/آشپز|آشپزخانه/.test(n))return'🍳';
  if(/دفتر/.test(n))return'🗂️';
  if(/کلاس|آموزش/.test(n))return'🏫';
  if(/حیاط|فضای باز/.test(n))return'🌳';
  if(/نگهبان|درب/.test(n))return'🚪';
  if(/مشاور/.test(n))return'💬';
  return'📍';
}

function sortLocsAlpha(){
  locations=[...locations].sort((a,b)=>a.localeCompare(b,'fa',{sensitivity:'base'}));

function moveLoc(i,dir){
  const j=i+dir;
  if(j<0||j>=locations.length)return;
  [locations[i],locations[j]]=[locations[j],locations[i]];
  saveAll();renderLocations(document.getElementById('app'));
}

function filterLocAssets(){
  const q=(document.getElementById('loc-asset-search').value||'').trim().toLowerCase();
  document.querySelectorAll('.loc-asset-row').forEach(row=>{
    const name=row.dataset.name||'';
    row.style.display=(!q||name.toLowerCase().includes(q))?'flex':'none';
  });
}

function selectLocAsset(assetId, toLoc){
  const asset=assets.find(a=>a.id===assetId);
  if(!asset)return;
  if(asset.location===toLoc){
    alert(`«${asset.name}» (برچسب: ${asset.tag||'—'}) در حال حاضر در همین مکان «${toLoc}» قرار دارد.`);
    return;
  }
  if(asset.location&&locations.includes(asset.location)){
    if(!confirm(`این کالا در مکان «${asset.location}» ثبت شده است.\n\nآیا از انتقال «${asset.name}» به «${toLoc}» اطمینان دارید؟\n\n✓ تأیید: از «${asset.location}» حذف و به «${toLoc}» اضافه می‌شود.`))return;
  } else {
    if(!confirm(`«${asset.name}» (برچسب: ${asset.tag||'—'}) به مکان «${toLoc}» اضافه شود؟`))return;
  }
  const idx=assets.findIndex(a=>a.id===assetId);
  assets[idx].location=toLoc;
  saveAll();
  _renderLocMgr(toLoc);
}

function addNewItemToLoc(loc){
  const name=document.getElementById('loc-add-new-name').value.trim();
  if(!name){alert('لطفاً نام کالا را وارد کنید');return;}
  // check if name already exists in any location
  const existing=assets.filter(a=>a.name===name);
  if(existing.length>0){
    const locs=[...new Set(existing.map(a=>a.location))].join('، ');
    if(!confirm(`کالایی با نام «${name}» قبلاً در مکان(های) «${locs}» ثبت شده است.\n\nآیا می‌خواهید یک قلم جدید با همین نام به «${loc}» اضافه شود؟`))return;
  }
  const type=document.getElementById('loc-add-type').value;
  const tag=document.getElementById('loc-add-tag').value.trim();
  const ref=existing[0];
  const mid=assets.reduce((m,a)=>Math.max(m,a.id),0);
  const mr=assets.reduce((m,a)=>Math.max(m,a.row||0),0);
  assets.push({id:mid+1,row:mr+1,name,type,code:ref?ref.code:'',model:ref?ref.model:'',
    location:loc,tag,price:ref?ref.price:0,hasTag:!!tag,notes:'',isScrap:false,isSurplus:false});
  saveAll();
  _renderLocMgr(loc);
}

function removeItemFromLoc(id,loc){
  const a=assets.find(x=>x.id===id);
  if(!a)return;
  if(!confirm(`«${a.name}» (برچسب: ${a.tag||'—'}) از مکان «${loc}» حذف می‌شود و جزو اقلام بدون مکان خواهد شد.\n\nاز لیست اموال حذف نمی‌شود. ادامه می‌دهید؟`))return;
  const idx=assets.findIndex(x=>x.id===id);
  assets[idx].location='';
  saveAll();
  _renderLocMgr(loc);
}

function addLoc(){
  const v=document.getElementById('new-loc').value.trim();
  if(!v)return;
  if(locations.includes(v)){alert('این مکان قبلاً وجود دارد');return;}
  locations.push(v);saveAll();renderLocations(document.getElementById('app'));
}
function removeLoc(i){
  if(assets.some(a=>a.location===locations[i])&&!confirm(`اموالی در "${locations[i]}" وجود دارد. حذف شود؟`))return;
  locations.splice(i,1);saveAll();renderLocations(document.getElementById('app'));
}

  </div>
  <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:12px" id="no-print">
    <div class="stat-card" style="background:linear-gradient(135deg,#4361ee,#3a0ca3)"><div class="num">${filtered.length.toLocaleString('fa-IR')}</div><div class="lbl">کل</div></div>
    <div class="stat-card" style="background:linear-gradient(135deg,#f72585,#b5179e)"><div class="num">${nonC.toLocaleString('fa-IR')}</div><div class="lbl">غیرمصرفی</div></div>
    <div class="stat-card" style="background:linear-gradient(135deg,#f8961e,#f3722c)"><div class="num">${cons.toLocaleString('fa-IR')}</div><div class="lbl">در حکم مصرفی</div></div>
    <div class="stat-card" style="background:linear-gradient(135deg,#7209b7,#560bad)"><div class="num" style="font-size:16px">${Math.round(totalVal/1000000).toLocaleString('fa-IR')}M</div><div class="lbl">ارزش (ریال)</div></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>${activeCols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
      <tbody>
        ${filtered.map(a=>`<tr>${activeCols.map(c=>`<td>${cellVal(a,c.key)}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div style="display:flex;justify-content:space-around;margin-top:28px;padding-top:16px;border-top:2px solid #eee;font-size:13px">
    <div style="text-align:center"><div style="color:#666">تحویل‌گیرنده</div><div style="font-weight:bold;margin:6px 0;color:#1a3a5c">${appSettings.sig1}</div>امضاء: ______________</div>
    <div style="text-align:center"><div style="color:#666">جمعدار اموال</div><div style="font-weight:bold;margin:6px 0;color:#1a3a5c">${appSettings.sig2}</div>امضاء: ______________</div>
    <div style="text-align:center"><div style="color:#666">رئیس اداره</div><div style="font-weight:bold;margin:6px 0;color:#1a3a5c">${appSettings.sig3}</div>امضاء: ______________</div>
  </div>`;
  // fix search focus
  const ri=document.getElementById('report-search');
  if(ri){
    ri.addEventListener('input',function(){
      clearTimeout(window._rst);
      const v=this.value, cp=this.selectionStart;
      window._rst=setTimeout(()=>{
        searchQ=v;
        renderReport(document.getElementById('app'));
        const ni=document.getElementById('report-search');
        if(ni){ni.focus();try{ni.setSelectionRange(cp,cp);}catch(e){}}
      },250);
    });
  }
}

function showColSelector(){
  const colDefs=[
    {key:'row',label:'ردیف'},
    {key:'tag',label:'شماره برچسب'},
    {key:'code',label:'کد مال'},
    {key:'name',label:'عنوان مال'},
    {key:'type',label:'نوع'},
    {key:'model',label:'مدل/ویژگی'},
    {key:'price',label:'قیمت (ریال)'},
    {key:'location',label:'مکان'},
    {key:'hasTag',label:'برچسب'},
    {key:'isScrap',label:'اسقاطی'},
    {key:'isSurplus',label:'مازاد'},
    {key:'notes',label:'ملاحظات'},
  ];
  const bg=document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML=`<div class="modal" style="max-width:420px">
    <h3>⚙️ انتخاب ستون‌های نمایش و چاپ</h3>
    <div style="font-size:12px;color:#888;margin-bottom:14px">ستون‌هایی که می‌خواهید در جدول گزارش و چاپ نمایش داده شوند را انتخاب کنید.</div>
    ${colDefs.map(c=>`
    <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;${printColumns[c.key]?'background:#f0f7ff':''}">
      <input type="checkbox" id="col-${c.key}" ${printColumns[c.key]?'checked':''} onchange="toggleCol('${c.key}',this.checked)" style="width:16px;height:16px">
      <span style="font-size:13px">${c.label}</span>
    </label>`).join('')}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:2px solid #f0f4f8">
      <button onclick="this.closest('.modal-bg').remove();renderReport(document.getElementById('app'))" class="btn-blue" style="padding:9px 22px">✅ اعمال و بستن</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click',e=>{if(e.target===bg){bg.remove();renderReport(document.getElementById('app'));}});
}

function toggleCol(key,val){
  printColumns[key]=val;
  saveAll();
  // update background of label
  const lbl=document.querySelector(`#col-${key}`)?.closest('label');
  if(lbl)lbl.style.background=val?'#f0f7ff':'';
}


// ===== SETTINGS =====
function renderSettings(app){
  app.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:800px">
    <div class="form-card">
      <div style="font-size:15px;font-weight:bold;color:#1a3a5c;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f0f4f8">🏫 اطلاعات مدرسه</div>
      <div class="form-row"><label>نام مدرسه</label><input type="text" id="s-school" value="${appSettings.schoolName}"></div>
      <div class="form-row"><label>نام مدیر</label><input type="text" id="s-principal" value="${appSettings.principal}"></div>
      <div class="form-row"><label>نام جمعدار اموال</label><input type="text" id="s-keeper" value="${appSettings.keeper}"></div>
      <div class="form-row"><label>نام سازمان</label><input type="text" id="s-org" value="${appSettings.org}"></div>
    </div>
    <div class="form-card">
      <div style="font-size:15px;font-weight:bold;color:#1a3a5c;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f0f4f8">✍️ امضاها</div>
      <div class="form-row"><label>امضای اول (تحویل‌گیرنده)</label><input type="text" id="s-sig1" value="${appSettings.sig1}"></div>
      <div class="form-row"><label>امضای دوم (جمعدار اموال)</label><input type="text" id="s-sig2" value="${appSettings.sig2}"></div>
      <div class="form-row"><label>امضای سوم (رئیس اداره)</label><input type="text" id="s-sig3" value="${appSettings.sig3}"></div>
      <div class="form-row" style="margin-top:16px;padding-top:12px;border-top:2px solid #f0f4f8">
        <label>🔐 تغییر رمز عبور</label>
        <input type="password" id="s-pwd" placeholder="رمز جدید (خالی = بدون تغییر)">
      </div>
      <div class="form-actions">
        <button class="btn-blue" onclick="saveSettings()" style="padding:10px 24px">💾 ذخیره تنظیمات</button>
      </div>
    </div>
  </div>`;
}
function saveSettings(){
  appSettings.schoolName=document.getElementById('s-school').value.trim()||appSettings.schoolName;
  appSettings.principal=document.getElementById('s-principal').value.trim()||appSettings.principal;
  appSettings.keeper=document.getElementById('s-keeper').value.trim()||appSettings.keeper;
  appSettings.org=document.getElementById('s-org').value.trim()||appSettings.org;
  appSettings.sig1=document.getElementById('s-sig1').value;
  appSettings.sig2=document.getElementById('s-sig2').value;
  appSettings.sig3=document.getElementById('s-sig3').value;
  const np=document.getElementById('s-pwd').value;
  if(np.trim())appSettings.password=np.trim();
  saveAll();updateHeader();
  alert('✅ تنظیمات ذخیره شد!');
}

// ===== EXPORT =====
function exportCSV(){
  const f=getFiltered();
  const rows=[['ردیف','شماره برچسب','کد مال','عنوان مال','نوع','مدل','قیمت (ریال)','مکان','برچسب','ملاحظات']];
  f.forEach(a=>rows.push([a.row||'',a.tag,a.code,a.name,a.type,a.model||'',a.price||'',a.location,a.hasTag?'دارد':'ندارد',a.notes||'']));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dlBlob(csv,'text/csv','اموال_نیاسری.csv');
}
function exportExcel(){
  const f=getFiltered();
  let t='<table border="1" style="direction:rtl"><thead><tr><th>ردیف</th><th>شماره برچسب</th><th>کد مال</th><th>عنوان مال</th><th>نوع</th><th>مدل</th><th>قیمت (ریال)</th><th>مکان</th><th>برچسب</th><th>اسقاطی</th><th>مازاد</th><th>ملاحظات</th></tr></thead><tbody>';
  f.forEach(a=>{t+=`<tr><td>${a.row||''}</td><td>${a.tag}</td><td>${a.code}</td><td>${a.name}</td><td>${a.type}</td><td>${a.model||''}</td><td>${a.price||''}</td><td>${a.location}</td><td>${a.hasTag?'دارد':'ندارد'}</td><td>${a.notes||''}</td></tr>`;});
  t+='</tbody></table>';
  dlBlob('\uFEFF'+t,'application/vnd.ms-excel','اموال_نیاسری.xls');
}
function backupData(){
  const d={assets,locations,settings:appSettings,exported:new Date().toISOString()};
  dlBlob(JSON.stringify(d,null,2),'application/json','backup_niasari_'+today().replace(/\//g,'-')+'.json');
  alert('✅ بکاپ دریافت شد!');
}
function restoreData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.assets&&Array.isArray(d.assets)){
          assets=d.assets;
          if(d.locations)locations=d.locations;
          if(d.settings)appSettings=d.settings;
          saveAll();updateHeader();
          alert('✅ بازیابی موفق! تعداد: '+assets.length+' قلم');
          showTab('dashboard');
        }else{alert('فایل معتبر نیست');}
      }catch{alert('خطا در خواندن فایل');}
    };r.readAsText(file);
  };inp.click();
}
function dlBlob(content,type,name){
  const b=new Blob([content],{type});
  const u=URL.createObjectURL(b);
  const el=document.createElement('a');el.href=u;el.download=name;el.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);
}
</script>
